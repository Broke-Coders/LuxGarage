<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LuxGarage</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="FirstPage">
      <div id="navbar">
        <img id="logo" src="images/logo.png" />
        <p id="logo-title">LuxGarage</p>
        <p id="cars-nav" class="navbar-text">Cars</p>
        <p id="why-us-nav" class="navbar-text">Why Us</p>
        <p id="vouchers-nav" class="navbar-text">Vouchers</p>
      </div>
      <section id="hero">
        <h1>
          <span>Rent</span> and <span>Drive</span><br />Like It's
          <span>Yours</span>
        </h1>
        <button>Book Now <span id="dot">.</span></button>
      </section>
    </div>
    <div id="SecondPage">
      <div id="navbar" class="second-navbar">
        <img id="logo" src="images/logo.png" />
        <p id="logo-title">LuxGarage</p>
        <p id="cars-nav" class="navbar-text">Cars</p>
        <p id="why-us-nav" class="navbar-text">Why Us</p>
        <p id="vouchers-nav" class="navbar-text">Vouchers</p>
      </div>

      <section id="hero2">
        <div class="hero2-layout1">
          <img src="images/performance.jpg" alt="Ferrari's wheel" />
          <h2 class="hero2-header">Performance</h2>
          <p class="hero2-text"></p>
        </div>
        <div class="hero2-layout2">
          <img src="images/luxury.jpg" alt="Limousine representing luxury" />
          <h2 class="hero2-header">Luxury</h2>
          <p class="hero2-text"></p>
        </div>
        <div class="hero2-layout1">
          <img src="images/discretion.png" alt="Elegant hand with key" />
          <h2 class="hero2-header">Discrecy</h2>
          <p class="hero2-text"></p>
        </div>
      </section>
    </div>

    <script></script>
  </body>
</html>

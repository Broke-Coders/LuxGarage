  assemblies:
  - LuxGarage.Tests
  namespace: LuxGarage.Tests
  summary: Asynchronous initialization method that starts the PostgreSQL container and applies any pending migrations to ensure the database is ready for testing.
  remarks: >-
    This method is called before any tests are run, allowing the tests to interact with a fully initialized database.

    It uses a temporary RentalContext to apply migrations, ensuring that the database schema is up to date before tests execute.
  example: []
  syntax:
    content: public Task InitializeAsync()
    return:
      type: System.Threading.Tasks.Task
      description: A Task that represents the asynchronous operation of initializing the database fixture, including starting the container and applying migrations.
    content.vb: Public Function InitializeAsync() As Task
